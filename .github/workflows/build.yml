name: Build Electron App

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Build Electron app
        run: pnpm exec electron-builder --linux --x64 --publish never

      - name: Upload to Release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} release/*.AppImage release/*.deb release/*.rpm --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: build-linux
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Build Electron app
        run: pnpm exec electron-builder --win --x64 --publish never

      - name: Upload to Release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} release/*.exe release/*.blockmap --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
